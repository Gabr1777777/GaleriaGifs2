<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRS | Digital Design</title>
    <style>
        :root {
            --neon-blue: #0048FF;
            --silver-grad: linear-gradient(135deg, #C0C0C0, #808080);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --anim-speed: 0.8s;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(0, 72, 255, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(192, 192, 192, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        /* TELA DE ENTRADA */
        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #050505;
            z-index: 100;
            transition: opacity var(--anim-speed) ease, visibility var(--anim-speed);
        }

        .btn-enter {
            padding: 18px 50px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: linear-gradient(45deg, #0048FF, #00d4ff, #0048FF, #00d4ff);
            background-size: 300% auto;
            transition: 0.5s;
            box-shadow: 0 0 20px rgba(0, 72, 255, 0.4);
            animation: gradientMove 4s ease infinite;
        }

        .btn-enter:hover {
            transform: scale(1.05);
            box-shadow: 0 0 35px rgba(0, 72, 255, 0.6);
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* CONTEÚDO PRINCIPAL */
        #main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity var(--anim-speed) ease, transform var(--anim-speed) cubic-bezier(0.175, 0.885, 0.32, 1.275);
            visibility: hidden;
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        .profile-header h1 {
            font-size: 1.8rem;
            background: var(--silver-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            letter-spacing: 3px;
            font-weight: 800;
        }

        .id-badge {
            font-size: 0.65rem;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            display: block;
            opacity: 0.8;
        }

        /* GRID CUSTOMIZADA */
        .gallery-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .item {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 20px 10px;
            transition: all 0.4s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .item:hover {
            border-color: var(--neon-blue);
            background: rgba(0, 72, 255, 0.05);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .item strong {
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: #eee;
        }

        .item span {
            font-size: 0.7rem;
            margin-top: 6px;
            color: #666;
            text-transform: uppercase;
        }

        .footer-text {
            font-size: 0.6rem;
            color: #444;
            margin-top: 30px;
            letter-spacing: 1px;
        }

        /* ESTADOS DE TRANSIÇÃO */
        .loaded #splash-screen {
            opacity: 0;
            visibility: hidden;
        }

        .loaded #main-content {
            opacity: 1;
            transform: scale(1);
            visibility: visible;
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div id="splash-screen">
    <button class="btn-enter" onclick="enterGallery()">Entrar</button>
</div>

<div id="main-content">
    <div class="container">
        <div class="profile-header">
            <h1>WRS DESIGN</h1>
            <span class="id-badge">Propriedade de Gabr (1777777)</span>
        </div>

        <div class="gallery-grid">
            <div class="item">
                <strong>GIFS</strong>
                <span>Collection</span>
            </div>
            <div class="item">
                <strong>PCBACK GIF</strong>
                <span>Visuals</span>
            </div>
            
            <div class="item">
                <strong>PSTYLE</strong>
                <span>Premium</span>
            </div>
            <div class="item">
                <strong>FUNDOS</strong>
                <span>Wallpapers</span>
            </div>
        </div>

        <div class="footer-text">
            &copy; 2026 WRS HUB &bull; DIGITAL ART TRADEMARK
        </div>
    </div>
</div>

<script>
    function enterGallery() {
        document.body.classList.add('loaded');
    }

    // Bloqueio de inspeção
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.onkeydown = function(e) {
        if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0))) {
            return false;
        }
    }
</script>

</body>
</html>
