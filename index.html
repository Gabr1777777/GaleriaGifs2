<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRS | Digital Design</title>
    <style>
        :root {
            --neon-blue: #0048FF;
            --silver-grad: linear-gradient(135deg, #C0C0C0, #808080);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --anim-speed: 0.8s;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050505; color: #ffffff;
            font-family: 'Inter', sans-serif; overflow: hidden;
        }

        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(0, 72, 255, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(192, 192, 192, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        /* TELA DE ENTRADA */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #050505; z-index: 100;
            transition: opacity var(--anim-speed) ease, visibility var(--anim-speed);
        }

        .btn-enter {
            padding: 18px 50px; font-size: 1.1rem; font-weight: bold;
            text-transform: uppercase; letter-spacing: 5px; color: white;
            border: none; border-radius: 12px; cursor: pointer;
            background: linear-gradient(45deg, #0048FF, #00d4ff, #0048FF);
            background-size: 200% auto; animation: gradientMove 3s infinite;
        }

        @keyframes gradientMove { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }

        /* CONTEÚDO PRINCIPAL */
        #main-content {
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            opacity: 0; transform: scale(0.95); visibility: hidden;
            transition: all var(--anim-speed) cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .container {
            width: 90%; max-width: 480px;
            background: var(--glass-bg); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 35px 25px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        .profile-header h1 {
            font-size: 1.8rem; background: var(--silver-grad);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 5px; letter-spacing: 3px; font-weight: 800;
        }

        .id-badge {
            font-size: 0.65rem; color: var(--neon-blue); letter-spacing: 2px;
            margin-bottom: 30px; display: block; opacity: 0.8;
        }

        .gallery-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
        }

        .item {
            background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 18px 10px; transition: 0.3s; cursor: pointer;
        }

        .item:hover { border-color: var(--neon-blue); transform: translateY(-3px); background: rgba(0, 72, 255, 0.05); }
        .item strong { font-size: 0.8rem; color: #eee; display: block; }
        .item span { font-size: 0.65rem; color: #555; text-transform: uppercase; margin-top: 4px; display: block; }

        /* PLAYER DE MUSICA */
        #music-player {
            margin-top: 20px; padding: 15px;
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            border-radius: 15px; display: none; animation: fadeIn 0.5s;
        }

        .btn-music {
            grid-column: span 2; border-color: #fff; margin-top: 10px;
        }

        .controls { display: flex; justify-content: center; gap: 15px; align-items: center; margin-top: 10px; }
        .controls button { background: none; border: 1px solid #444; color: white; cursor: pointer; padding: 5px 10px; border-radius: 5px; }
        .song-info { font-size: 0.7rem; color: var(--neon-blue); margin-bottom: 5px; }

        @keyframes fadeIn { from {opacity: 0; transform: translateY(10px);} to {opacity: 1; transform: translateY(0);} }

        /* ESTADOS */
        .loaded #splash-screen { opacity: 0; visibility: hidden; }
        .loaded #main-content { opacity: 1; transform: scale(1); visibility: visible; }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div id="splash-screen">
    <button class="btn-enter" onclick="enterGallery()">Entrar</button>
</div>

<div id="main-content">
    <div class="container">
        <div class="profile-header">
            <h1>WRS DESIGN</h1>
            <span class="id-badge">ID: GABR (1777777)</span>
        </div>

        <div class="gallery-grid">
            <div class="item"><strong>GIFS</strong><span>Library</span></div>
            <div class="item"><strong>PCBACK GIF</strong><span>Animated</span></div>
            <div class="item"><strong>PSTYLE GIF</strong><span>Premium</span></div>
            <div class="item"><strong>FUNDOS</strong><span>Wallpapers</span></div>
            <div class="item"><strong>PSTYLE ESTÁTICO</strong><span>Classic</span></div>
            <div class="item"><strong>PCBACK ESTÁTICO</strong><span>Desktop</span></div>
            
            <div class="item btn-music" onclick="togglePlayer()">
                <strong>MUSIC PLAYER</strong>
                <span id="player-status">Clique para Abrir</span>
            </div>
        </div>

        <div id="music-player">
            <div class="song-info" id="current-song">Música: ---</div>
            <div class="controls">
                <button onclick="prevSong()">❮</button>
                <button onclick="playPause()" id="play-btn">Play</button>
                <button onclick="nextSong()">❯</button>
            </div>
        </div>

        <div class="footer-text" style="font-size: 0.6rem; color: #444; margin-top: 25px;">&copy; 2026 WRS HUB</div>
    </div>
</div>

<script>
    const playlist = [
        { name: "Eminem - You dont know", url: "https://www.dropbox.com/scl/fi/4y0lc0fi24e9yavn17psv/Eminem-you-dont-know.mp3.mp3?rlkey=zicb6spgqe3pv0gqnz3xc24zo&st=wy1w0icm&raw=1" },
        { name: "The Sound of Silence – Rising to the Night", url: "https://www.dropbox.com/scl/fi/2y9zhx5zjsdxg3zljc2f9/sound-of-silence.mp3.mp3?rlkey=88zg0td3loy40uxmcm9rnk1jt&st=qty8093e&raw=1" },
        { name: "Desireless - Voyage Voyage", url: "https://www.dropbox.com/scl/fi/2y9zhx5zjsdxg3zljc2f9/sound-of-silence.mp3.mp3?rlkey=88zg0td3loy40uxmcm9rnk1jt&st=0yenl8sh&raw=1" }
    ];

    let currentTrack = 0;
    const audio = new Audio();
    const playBtn = document.getElementById('play-btn');
    const songInfo = document.getElementById('current-song');

    function enterGallery() { document.body.classList.add('loaded'); }

    function togglePlayer() {
        const player = document.getElementById('music-player');
        player.style.display = (player.style.display === 'block') ? 'none' : 'block';
        if (audio.src === "") loadSong(0);
    }

    function loadSong(index) {
        currentTrack = index;
        audio.src = playlist[index].url;
        songInfo.innerText = playlist[index].name;
    }

    function playPause() {
        if (audio.paused) {
            audio.play();
            playBtn.innerText = "Pause";
        } else {
            audio.pause();
            playBtn.innerText = "Play";
        }
    }

    function nextSong() {
        currentTrack = (currentTrack + 1) % playlist.length;
        loadSong(currentTrack);
        audio.play();
        playBtn.innerText = "Pause";
    }

    function prevSong() {
        currentTrack = (currentTrack - 1 + playlist.length) % playlist.length;
        loadSong(currentTrack);
        audio.play();
        playBtn.innerText = "Pause";
    }

    audio.onended = () => nextSong();

    // Proteção básica
    document.addEventListener('contextmenu', e => e.preventDefault());
</script>

</body>
</html>
