<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRS | Digital Experience</title>
    <style>
        :root {
            --neon-blue: #0048FF;
            --silver-text: linear-gradient(135deg, #ffffff 0%, #a1a1a1 100%);
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #020202;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Fundo com efeito de profundidade */
        .bg-overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #0a0a0a 0%, #000 100%);
            z-index: -1;
        }

        .glow-sphere {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 72, 255, 0.12) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* TELA DE ENTRADA */
        #landing-page {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .brand-logo {
            font-size: 3.5rem;
            font-weight: 900;
            background: var(--silver-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 10px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
        }

        .enter-btn {
            padding: 15px 60px;
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: white;
            font-size: 0.9rem;
            letter-spacing: 5px;
            cursor: pointer;
            transition: 0.5s;
            position: relative;
            overflow: hidden;
        }

        .enter-btn:hover {
            background: var(--neon-blue);
            box-shadow: 0 0 30px var(--neon-blue);
        }

        /* PÁGINA DE CONTEÚDO (PCBACK) */
        #main-content {
            display: none; /* Escondido inicialmente */
            opacity: 0;
            height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            overflow-y: auto;
            flex-direction: column;
            align-items: center;
        }

        .content-card {
            width: 100%;
            max-width: 600px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px;
            margin-top: 20px;
        }

        .category-title {
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .pcback-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .pcback-item {
            aspect-ratio: 16/9;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.7rem;
            color: #666;
            transition: 0.3s;
            cursor: pointer;
        }

        .pcback-item:hover {
            border-color: var(--neon-blue);
            color: white;
            background: rgba(0, 72, 255, 0.05);
        }

        /* UTILIDADES */
        .hidden {
            display: none !important;
        }

        .fade-in {
            display: flex !important;
            animation: fadeInAnim 1s forwards;
        }

        @keyframes fadeInAnim {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .propriedade {
            position: fixed;
            bottom: 20px;
            font-size: 0.6rem;
            color: #333;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>
<div class="glow-sphere"></div>

<section id="landing-page">
    <div class="brand-logo">WRS</div>
    <button class="enter-btn" onclick="entrar()">ENTRAR</button>
    <div class="propriedade">PROPRIEDADE DE GABR (1777777)</div>
</section>

<section id="main-content">
    <div class="content-card">
        <div class="category-title">Explore</div>
        <h2 style="font-weight: 300; margin: 0;">PCBACK <span style="color: var(--neon-blue);">COLLECTION</span></h2>
        
        <div class="pcback-grid">
            <div class="pcback-item">GIF PREVIEW 1</div>
            <div class="pcback-item">GIF PREVIEW 2</div>
            <div class="pcback-item">GIF PREVIEW 3</div>
            <div class="pcback-item">GIF PREVIEW 4</div>
            <div class="pcback-item">GIF PREVIEW 5</div>
            <div class="pcback-item">GIF PREVIEW 6</div>
        </div>

        <p style="font-size: 0.8rem; color: #555; margin-top: 40px; text-align: center;">
            Designs exclusivos desenvolvidos para xat.com
        </p>
    </div>
</section>

<script>
    function entrar() {
        const landing = document.getElementById('landing-page');
        const content = document.getElementById('main-content');

        // Efeito de saída
        landing.style.opacity = '0';
        landing.style.transform = 'scale(1.1)';

        setTimeout(() => {
            landing.classList.add('hidden');
            content.classList.add('fade-in');
            document.body.style.overflowY = 'auto'; // Habilita scroll na segunda página
        }, 800);
    }

    // Segurança básica
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = function(e) {
        if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
            return false;
        }
    };
</script>

</body>
</html>
