<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRS | Digital Design</title>
    <style>
        :root {
            --neon-blue: #0048FF;
            --silver-grad: linear-gradient(135deg, #C0C0C0, #808080);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --anim-speed: 0.8s;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Fundo com efeito de luzes */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(0, 72, 255, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(192, 192, 192, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        /* --- TELA DE ENTRADA --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #050505;
            z-index: 100;
            transition: opacity var(--anim-speed) ease, visibility var(--anim-speed);
        }

        .btn-enter {
            padding: 20px 60px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            background: linear-gradient(45deg, #0048FF, #00d4ff, #0048FF);
            background-size: 200% auto;
            transition: 0.5s;
            box-shadow: 0 0 20px rgba(0, 72, 255, 0.4);
            animation: gradientMove 3s linear infinite;
        }

        .btn-enter:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(0, 72, 255, 0.7);
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- CONTEÚDO PRINCIPAL --- */
        #main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity var(--anim-speed) ease, transform var(--anim-speed) ease;
            visibility: hidden;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .profile-header h1 {
            font-size: 2rem;
            background: var(--silver-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .id-badge {
            font-size: 0.7rem;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            display: block;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 25px 0;
        }

        .item {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            transition: 0.3s;
            cursor: pointer;
        }

        .item:hover {
            border-color: var(--neon-blue);
            transform: translateY(-5px);
            box-shadow: 0 0 15px rgba(0, 72, 255, 0.3);
        }

        .item span {
            font-size: 0.8rem;
            display: block;
            margin-top: 8px;
            color: #aaa;
        }

        .footer-text {
            font-size: 0.65rem;
            color: #555;
            margin-top: 25px;
        }

        /* Classe para ativar a transição via JS */
        .loaded #splash-screen {
            opacity: 0;
            visibility: hidden;
        }

        .loaded #main-content {
            opacity: 1;
            transform: translateY(0);
            visibility: visible;
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div id="splash-screen">
    <button class="btn-enter" onclick="enterGallery()">Entrar</button>
</div>

<div id="main-content">
    <div class="container">
        <div class="profile-header">
            <h1>WRS DESIGN</h1>
            <span class="id-badge">Propriedade de Gabr (1777777)</span>
        </div>

        <div class="gallery-grid">
            <div class="item">
                <strong>PCBACK</strong>
                <span>Visual Styles</span>
            </div>
            <div class="item">
                <strong>GIF SHOP</strong>
                <span>Premium Assets</span>
            </div>
            <div class="item">
                <strong>LAYOUTS</strong>
                <span>xat.com Tech</span>
            </div>
            <div class="item">
                <strong>PROJECTS</strong>
                <span>Active Works</span>
            </div>
        </div>

        <div class="footer-text">
            &copy; 2026 WRS Hub. Todos os direitos reservados.
        </div>
    </div>
</div>

<script>
    function enterGallery() {
        document.body.classList.add('loaded');
    }

    // Bloqueio básico de inspeção
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.onkeydown = function(e) {
        if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0))) {
            return false;
        }
    }
</script>

</body>
</html>
